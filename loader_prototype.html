<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Animation Prototype</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f7f5f2;
    font-family: 'Inter', 'Segoe UI', sans-serif;
  }

  .loader-overlay {
    position: fixed; inset: 0; z-index: 99999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #f7f5f2;
    animation: loaderFadeOut 0.6s ease 3.4s forwards;
  }

  .loader-scene {
    position: relative;
    width: 280px; height: 280px;
  }

  /* ─── Golden Sun Circle ─── */
  .loader-sun {
    position: absolute;
    top: 0; left: 50%;
    transform: translateX(-50%) scale(0);
    width: 180px; height: 180px;
    background: #e8a308;
    border-radius: 50%;
    animation: sunReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
  }

  /* ─── City Skyline (SVG silhouette) ─── */
  .loader-skyline {
    position: absolute;
    top: 55px; left: 50%;
    transform: translateX(-50%);
    width: 170px; height: 100px;
    opacity: 0;
    animation: skylineFade 0.5s ease 0.6s forwards;
  }
  .loader-skyline svg { width: 100%; height: 100%; }

  /* ─── Walking Figure ─── */
  .loader-figure {
    position: absolute;
    bottom: 40px; left: 50%;
    transform: translateX(-60%);
    width: 90px; height: 150px;
    opacity: 0;
    animation: figureWalkIn 1.2s cubic-bezier(0.22, 1, 0.36, 1) 0.1s forwards;
  }
  .loader-figure svg { width: 100%; height: 100%; overflow: visible; }

  /* Walking legs animation */
  .figure-left-leg {
    animation: legSwingLeft 0.5s ease-in-out infinite alternate;
    transform-origin: 45px 75px;
  }
  .figure-right-leg {
    animation: legSwingRight 0.5s ease-in-out infinite alternate;
    transform-origin: 45px 75px;
  }
  .figure-left-arm {
    animation: armSwingLeft 0.5s ease-in-out infinite alternate;
    transform-origin: 43px 48px;
  }
  .figure-right-arm {
    animation: armSwingRight 0.5s ease-in-out infinite alternate;
    transform-origin: 43px 48px;
  }

  /* Shopping bag swings with right arm */
  .figure-bag {
    animation: armSwingRight 0.5s ease-in-out infinite alternate;
    transform-origin: 43px 48px;
  }

  /* ─── Shadow ─── */
  .loader-shadow {
    position: absolute;
    bottom: 32px; left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 100px; height: 16px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.18) 0%, transparent 70%);
    border-radius: 50%;
    animation: shadowGrow 0.5s ease 1.0s forwards;
  }

  /* ─── Brand Text ─── */
  .loader-text {
    margin-top: 14px;
    font-size: 28px;
    font-weight: 800;
    letter-spacing: -0.5px;
    overflow: hidden;
    white-space: nowrap;
    opacity: 0;
    animation: textReveal 0.6s ease 1.4s forwards;
  }
  .loader-text .t-daily { color: #1a1a1a; }
  .loader-text .t-stop { color: #e8a308; }
  .loader-text .t-toshop { color: #1a1a1a; }

  /* Text characters animate in */
  .loader-text span {
    display: inline-block;
    animation: charBounce 0.4s cubic-bezier(0.34, 1.56, 0.64, 1) both;
  }
  .loader-text .t-daily span:nth-child(1) { animation-delay: 1.4s; }
  .loader-text .t-daily span:nth-child(2) { animation-delay: 1.45s; }
  .loader-text .t-daily span:nth-child(3) { animation-delay: 1.5s; }
  .loader-text .t-daily span:nth-child(4) { animation-delay: 1.55s; }
  .loader-text .t-daily span:nth-child(5) { animation-delay: 1.6s; }
  .loader-text .t-stop span:nth-child(1) { animation-delay: 1.7s; }
  .loader-text .t-stop span:nth-child(2) { animation-delay: 1.75s; }
  .loader-text .t-stop span:nth-child(3) { animation-delay: 1.8s; }
  .loader-text .t-stop span:nth-child(4) { animation-delay: 1.85s; }
  .loader-text .t-toshop span:nth-child(1) { animation-delay: 1.95s; }
  .loader-text .t-toshop span:nth-child(2) { animation-delay: 2.0s; }
  .loader-text .t-toshop span:nth-child(3) { animation-delay: 2.05s; }
  .loader-text .t-toshop span:nth-child(4) { animation-delay: 2.1s; }
  .loader-text .t-toshop span:nth-child(5) { animation-delay: 2.15s; }
  .loader-text .t-toshop span:nth-child(6) { animation-delay: 2.2s; }

  /* ─── Keyframes ─── */
  @keyframes sunReveal {
    0% { transform: translateX(-50%) scale(0); }
    100% { transform: translateX(-50%) scale(1); }
  }
  @keyframes skylineFade {
    0% { opacity: 0; transform: translateX(-50%) translateY(15px); }
    100% { opacity: 1; transform: translateX(-50%) translateY(0); }
  }
  @keyframes figureWalkIn {
    0% { opacity: 0; transform: translateX(-250%); }
    30% { opacity: 1; }
    100% { opacity: 1; transform: translateX(-60%); }
  }
  @keyframes shadowGrow {
    0% { transform: translateX(-50%) scaleX(0); opacity: 0; }
    100% { transform: translateX(-50%) scaleX(1); opacity: 1; }
  }
  @keyframes textReveal {
    0% { opacity: 0; transform: translateY(10px); }
    100% { opacity: 1; transform: translateY(0); }
  }
  @keyframes charBounce {
    0% { opacity: 0; transform: translateY(15px) scale(0.5); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes legSwingLeft {
    0% { transform: rotate(-18deg); }
    100% { transform: rotate(18deg); }
  }
  @keyframes legSwingRight {
    0% { transform: rotate(18deg); }
    100% { transform: rotate(-18deg); }
  }
  @keyframes armSwingLeft {
    0% { transform: rotate(15deg); }
    100% { transform: rotate(-10deg); }
  }
  @keyframes armSwingRight {
    0% { transform: rotate(-15deg); }
    100% { transform: rotate(10deg); }
  }
  @keyframes loaderFadeOut {
    0% { opacity: 1; }
    100% { opacity: 0; pointer-events: none; visibility: hidden; }
  }
</style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-scene">
    <!-- Golden Sun -->
    <div class="loader-sun"></div>

    <!-- City Skyline Silhouette -->
    <div class="loader-skyline">
      <svg viewBox="0 0 200 100" fill="#f7f5f2" xmlns="http://www.w3.org/2000/svg">
        <!-- Simplified city skyline cut-out in the sun -->
        <rect x="10" y="40" width="12" height="60"/>
        <rect x="14" y="30" width="8" height="70"/>
        <rect x="26" y="50" width="10" height="50"/>
        <rect x="24" y="35" width="6" height="65"/>
        <rect x="38" y="55" width="14" height="45"/>
        <rect x="42" y="45" width="6" height="55"/>
        <rect x="54" y="35" width="8" height="65"/>
        <rect x="64" y="50" width="12" height="50"/>
        <rect x="68" y="40" width="4" height="60"/>
        <rect x="78" y="30" width="6" height="70"/>
        <rect x="80" y="20" width="4" height="80"/>
        <!-- Tall spire -->
        <rect x="84" y="10" width="2" height="90"/>
        <polygon points="83,15 87,15 85,5"/>
        <rect x="88" y="25" width="8" height="75"/>
        <rect x="92" y="35" width="6" height="65"/>
        <rect x="100" y="50" width="10" height="50"/>
        <rect x="104" y="40" width="4" height="60"/>
        <rect x="112" y="45" width="12" height="55"/>
        <rect x="118" y="35" width="6" height="65"/>
        <rect x="126" y="55" width="8" height="45"/>
        <rect x="130" y="50" width="6" height="50"/>
        <rect x="138" y="45" width="10" height="55"/>
        <rect x="150" y="50" width="12" height="50"/>
        <rect x="164" y="55" width="10" height="45"/>
        <rect x="156" y="40" width="6" height="60"/>
        <rect x="176" y="50" width="14" height="50"/>
        <rect x="180" y="42" width="8" height="58"/>
      </svg>
    </div>

    <!-- Walking Stick Figure -->
    <div class="loader-figure">
      <svg viewBox="0 0 90 150" xmlns="http://www.w3.org/2000/svg">
        <!-- Head -->
        <circle cx="45" cy="22" r="14" fill="#1a1a1a"/>

        <!-- Body -->
        <line x1="45" y1="36" x2="45" y2="80" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>

        <!-- Torso highlight (white line like in video) -->
        <line x1="43" y1="40" x2="43" y2="72" stroke="#f7f5f2" stroke-width="2" stroke-linecap="round"/>

        <!-- Left Arm -->
        <g class="figure-left-arm">
          <line x1="45" y1="48" x2="28" y2="70" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
        </g>

        <!-- Right Arm + Shopping Bag -->
        <g class="figure-bag">
          <line x1="45" y1="48" x2="62" y2="70" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
          <!-- Shopping bag -->
          <rect x="55" y="68" width="24" height="28" rx="3" fill="#e8a308" stroke="#c78b06" stroke-width="1"/>
          <!-- Bag handles -->
          <path d="M61 68 Q61 60 67 60 Q73 60 73 68" fill="none" stroke="#c78b06" stroke-width="1.5"/>
        </g>

        <!-- Left Leg -->
        <g class="figure-left-leg">
          <line x1="45" y1="78" x2="28" y2="120" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
          <!-- Foot -->
          <line x1="28" y1="120" x2="22" y2="124" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
        </g>

        <!-- Right Leg -->
        <g class="figure-right-leg">
          <line x1="45" y1="78" x2="62" y2="120" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
          <!-- Foot -->
          <line x1="62" y1="120" x2="68" y2="124" stroke="#1a1a1a" stroke-width="5" stroke-linecap="round"/>
        </g>
      </svg>
    </div>

    <!-- Shadow -->
    <div class="loader-shadow"></div>
  </div>

  <!-- Brand Text -->
  <div class="loader-text">
    <span class="t-daily"><span>d</span><span>a</span><span>i</span><span>l</span><span>y</span></span><span class="t-stop"><span>s</span><span>t</span><span>o</span><span>p</span></span><span class="t-toshop"><span>t</span><span>o</span><span>s</span><span>h</span><span>o</span><span>p</span></span>
  </div>
</div>

<script>
  // Remove loader after animation completes
  setTimeout(() => {
    const loader = document.getElementById('loader');
    if (loader) loader.remove();
  }, 4000);
</script>

</body>
</html>
