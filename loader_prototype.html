<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Animation Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f5f5f0;
    font-family: 'Outfit', 'Segoe UI', sans-serif;
  }

  /* ───────────── Loader overlay ───────────── */
  .loader-overlay {
    position: fixed; inset: 0; z-index: 99999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #f5f5f0;
    animation: loaderFadeOut 0.9s ease 4.65s forwards;
  }

  .loader-scene {
    position: relative;
    width: 300px; height: 280px;
  }

  /* ───────────── Golden sun circle ───────────── */
  .loader-sun {
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%) scale(0);
    width: 190px; height: 190px;
    border-radius: 50%;
    overflow: hidden;
    transform-origin: center center;
    animation: sunReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
  }
  .loader-sun svg { width: 100%; height: 100%; display: block; }
  /* Skyline rises up inside the circle */
  .loader-sun .skyline-group {
    transform: translateY(70px);
    animation: skylineRise 0.6s ease 0.55s forwards;
  }

  /* ───────────── Shadow ───────────── */
  .loader-shadow {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 96px; height: 15px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.16) 0%, transparent 70%);
    border-radius: 50%;
    animation: shadowGrow 0.5s ease 0.85s forwards;
  }

  /* ───────────── Walking figure ───────────── */
  .loader-figure {
    position: absolute;
    bottom: 52px; left: 50%;
    width: 110px; height: 190px;
    transform: translateX(-50%);
    opacity: 0;
    animation: figureWalkIn 1.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.05s forwards;
  }
  .loader-figure svg { width: 100%; height: 100%; overflow: visible; }

  /* Each limb runs ONE finite 2.4s timeline: walk strides baked in, then it
     locks into a FULL mid-stride pose (limbs swung outward) and holds forever. */
  .figure-body { animation: body 2.4s ease-in-out forwards; }
  .leg-front { transform-origin: 55px 96px; animation: leg 2.4s ease-in-out forwards; }
  .leg-back  { transform-origin: 55px 96px; animation: legAlt 2.4s ease-in-out forwards; }
  .shin-front { transform-origin: 55px 130px; animation: shin 2.4s ease-in-out forwards; }
  .shin-back  { transform-origin: 55px 130px; animation: shinAlt 2.4s ease-in-out forwards; }
  .arm-back  { transform-origin: 55px 60px; animation: armAlt 2.4s ease-in-out forwards; }
  .arm-front { transform-origin: 55px 60px; animation: arm 2.4s ease-in-out forwards; }
  .bag-group { transform-origin: 55px 60px; animation: arm 2.4s ease-in-out forwards; }

  /* ───────────── Brand text ───────────── */
  .loader-text {
    margin-top: 18px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    white-space: nowrap;
    perspective: 600px;
  }
  .loader-text > span { display: inline-block; }
  .loader-text .t-daily { color: #1a1a1a; }
  .loader-text .t-stop  { color: #e8a308; }
  .loader-text .t-to    { color: #1a1a1a; }
  .loader-text .t-shop  { color: #e8a308; }

  /* "Daily" — letters cascade down and bounce in */
  .t-daily span {
    display: inline-block; opacity: 0;
    transform: translateY(-22px) scale(0.7);
    animation: drop 0.5s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .t-daily span:nth-child(1){animation-delay:1.45s}
  .t-daily span:nth-child(2){animation-delay:1.52s}
  .t-daily span:nth-child(3){animation-delay:1.59s}
  .t-daily span:nth-child(4){animation-delay:1.66s}
  .t-daily span:nth-child(5){animation-delay:1.73s}
  /* "Stop" — springs/pops in */
  .t-stop { opacity: 0; transform: scale(0.2); animation: pop 0.55s cubic-bezier(0.34, 1.8, 0.5, 1) 1.95s forwards; }
  /* "To" — flips in on X */
  .t-to { opacity: 0; transform-origin: center bottom; transform: rotateX(-90deg); animation: flip 0.5s cubic-bezier(0.22, 1, 0.36, 1) 2.3s forwards; }
  /* "Shop" — slides in from right, blur sharpens */
  .t-shop { opacity: 0; transform: translateX(34px); filter: blur(6px); animation: slideSharp 0.55s cubic-bezier(0.22, 1, 0.36, 1) 2.6s forwards; }

  /* ───────────── Keyframes ───────────── */
  @keyframes sunReveal {
    0%   { transform: translateX(-50%) scale(0); }
    100% { transform: translateX(-50%) scale(1); }
  }
  @keyframes skylineRise {
    0%   { transform: translateY(70px); }
    100% { transform: translateY(0); }
  }
  @keyframes shadowGrow {
    0%   { transform: translateX(-50%) scaleX(0); opacity: 0; }
    100% { transform: translateX(-50%) scaleX(1); opacity: 1; }
  }
  @keyframes figureWalkIn {
    0%   { opacity: 0; transform: translateX(-260%); }
    25%  { opacity: 1; }
    100% { opacity: 1; transform: translateX(-50%); }
  }
  @keyframes loaderFadeOut {
    0%   { opacity: 1; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
  }

  /* Per-word brand entrances */
  @keyframes drop { 0%{opacity:0;transform:translateY(-22px) scale(0.7)} 60%{opacity:1} 100%{opacity:1;transform:translateY(0) scale(1)} }
  @keyframes pop { 0%{opacity:0;transform:scale(0.2)} 70%{opacity:1;transform:scale(1.12)} 100%{opacity:1;transform:scale(1)} }
  @keyframes flip { 0%{opacity:0;transform:rotateX(-90deg)} 100%{opacity:1;transform:rotateX(0deg)} }
  @keyframes slideSharp { 0%{opacity:0;transform:translateX(34px);filter:blur(6px)} 100%{opacity:1;transform:translateX(0);filter:blur(0)} }

  /* Single finite limb timelines: 0-75% walking (3 strides), then hold a FULL
     mid-stride pose — front limbs swung forward, back limbs swung back. */
  @keyframes body {
    0%{transform:translateY(0)} 12.5%{transform:translateY(-2.5px)}
    25%{transform:translateY(0)} 37.5%{transform:translateY(-2.5px)}
    50%{transform:translateY(0)} 62.5%{transform:translateY(-2.5px)}
    75%,100%{transform:translateY(0)}
  }
  @keyframes leg {
    0%{transform:rotate(28deg)} 12.5%{transform:rotate(-26deg)}
    25%{transform:rotate(28deg)} 37.5%{transform:rotate(-26deg)}
    50%{transform:rotate(28deg)} 62.5%{transform:rotate(-26deg)}
    75%{transform:rotate(28deg)} 85%,100%{transform:rotate(30deg)}
  }
  @keyframes legAlt {
    0%{transform:rotate(-26deg)} 12.5%{transform:rotate(28deg)}
    25%{transform:rotate(-26deg)} 37.5%{transform:rotate(28deg)}
    50%{transform:rotate(-26deg)} 62.5%{transform:rotate(28deg)}
    75%{transform:rotate(-26deg)} 85%,100%{transform:rotate(-28deg)}
  }
  @keyframes shin {
    0%{transform:rotate(2deg)} 6.25%{transform:rotate(38deg)} 12.5%{transform:rotate(10deg)}
    25%{transform:rotate(2deg)} 31.25%{transform:rotate(38deg)} 37.5%{transform:rotate(10deg)}
    50%{transform:rotate(2deg)} 56.25%{transform:rotate(38deg)} 62.5%{transform:rotate(10deg)}
    75%{transform:rotate(2deg)} 85%,100%{transform:rotate(4deg)}
  }
  @keyframes shinAlt {
    0%{transform:rotate(10deg)} 12.5%{transform:rotate(2deg)} 18.75%{transform:rotate(38deg)}
    25%{transform:rotate(10deg)} 37.5%{transform:rotate(2deg)} 43.75%{transform:rotate(38deg)}
    50%{transform:rotate(10deg)} 62.5%{transform:rotate(2deg)} 68.75%{transform:rotate(38deg)}
    75%{transform:rotate(10deg)} 85%,100%{transform:rotate(22deg)}
  }
  @keyframes arm {
    0%{transform:rotate(-22deg)} 12.5%{transform:rotate(20deg)}
    25%{transform:rotate(-22deg)} 37.5%{transform:rotate(20deg)}
    50%{transform:rotate(-22deg)} 62.5%{transform:rotate(20deg)}
    75%{transform:rotate(-22deg)} 85%,100%{transform:rotate(22deg)}
  }
  @keyframes armAlt {
    0%{transform:rotate(20deg)} 12.5%{transform:rotate(-22deg)}
    25%{transform:rotate(20deg)} 37.5%{transform:rotate(-22deg)}
    50%{transform:rotate(20deg)} 62.5%{transform:rotate(-22deg)}
    75%{transform:rotate(20deg)} 85%,100%{transform:rotate(-22deg)}
  }

  @media (prefers-reduced-motion: reduce) {
    .figure-body, .leg-front, .leg-back, .shin-front, .shin-back,
    .arm-back, .arm-front, .bag-group,
    .t-daily span, .t-stop, .t-to, .t-shop { animation: none; }
    .t-daily span, .t-stop, .t-to, .t-shop { opacity: 1; transform: none; filter: none; }
  }
</style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-scene">

    <!-- Golden sun circle with skyline cut out as negative space -->
    <div class="loader-sun">
      <svg viewBox="0 0 190 190" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="skylineMask">
            <rect x="0" y="0" width="190" height="190" fill="#fff"/>
            <g class="skyline-group" fill="#000">
              <!-- NYC-style skyline cut out of the lower half -->
              <rect x="18" y="120" width="14" height="70"/>
              <rect x="30" y="108" width="10" height="82"/>
              <rect x="42" y="126" width="12" height="64"/>
              <rect x="54" y="112" width="9" height="78"/>
              <rect x="64" y="122" width="12" height="68"/>
              <rect x="78" y="96" width="10" height="94"/>
              <!-- central spire (Empire State) -->
              <rect x="90" y="74" width="12" height="116"/>
              <rect x="94" y="60" width="4" height="22"/>
              <polygon points="93,62 99,62 96,50"/>
              <rect x="104" y="108" width="11" height="82"/>
              <rect x="117" y="120" width="12" height="70"/>
              <rect x="131" y="112" width="9" height="78"/>
              <rect x="142" y="126" width="13" height="64"/>
              <rect x="157" y="118" width="11" height="72"/>
            </g>
          </mask>
        </defs>
        <circle cx="95" cy="95" r="95" fill="#e8a308" mask="url(#skylineMask)"/>
      </svg>
    </div>

    <!-- Ground shadow -->
    <div class="loader-shadow"></div>

    <!-- Walking figure (faces right, walks left -> centre) -->
    <div class="loader-figure">
      <svg viewBox="0 0 110 190" xmlns="http://www.w3.org/2000/svg">
        <g class="figure-body">
          <!-- BACK LEG (drawn first so front leg overlaps) -->
          <g class="leg-back">
            <line x1="55" y1="96" x2="55" y2="132" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
            <g class="shin-back">
              <line x1="55" y1="130" x2="55" y2="168" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
              <line x1="55" y1="168" x2="66" y2="170" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
            </g>
          </g>

          <!-- BACK ARM -->
          <g class="arm-back">
            <line x1="55" y1="60" x2="55" y2="94" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
          </g>

          <!-- HEAD -->
          <circle cx="55" cy="30" r="15" fill="#1a1a1a"/>
          <!-- TORSO -->
          <line x1="55" y1="45" x2="55" y2="98" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
          <!-- Torso highlight (reflection), slightly left of centre -->
          <path d="M52 50 Q49 72 52 92" fill="none" stroke="#1a1a1a" stroke-width="2.2" stroke-linecap="round"/>

          <!-- FRONT LEG -->
          <g class="leg-front">
            <line x1="55" y1="96" x2="55" y2="132" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
            <g class="shin-front">
              <line x1="55" y1="130" x2="55" y2="168" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
              <line x1="55" y1="168" x2="66" y2="170" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
            </g>
          </g>

          <!-- FRONT ARM (the right hand, holds the bag) -->
          <g class="arm-front">
            <line x1="55" y1="60" x2="55" y2="96" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
          </g>

          <!-- SHOPPING BAG, swings with the front arm -->
          <g class="bag-group">
            <path d="M50 96 Q50 86 55 86 Q60 86 60 96" fill="none" stroke="#c78b06" stroke-width="2"/>
            <rect x="43" y="96" width="24" height="28" rx="3" fill="#e8a308" stroke="#c78b06" stroke-width="1.5"/>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <!-- Brand text -->
  <div class="loader-text">
    <span class="t-daily"><span>D</span><span>a</span><span>i</span><span>l</span><span>y</span></span><span class="t-stop">Stop</span><span class="t-to">To</span><span class="t-shop">Shop</span>
  </div>
</div>

<script>
  // Remove loader once the animation has fully faded out
  window.addEventListener('load', function () {
    setTimeout(function () {
      var loader = document.getElementById('loader');
      if (loader) loader.remove();
    }, 5600);
  });
</script>

</body>
</html>
