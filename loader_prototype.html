<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Loading Animation Prototype</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Outfit:wght@300..800&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    display: flex; justify-content: center; align-items: center;
    min-height: 100vh; background: #f5f5f0;
    font-family: 'Outfit', 'Segoe UI', sans-serif;
  }

  /* ───────────── Loader overlay ───────────── */
  .loader-overlay {
    position: fixed; inset: 0; z-index: 99999;
    display: flex; flex-direction: column;
    justify-content: center; align-items: center;
    background: #f5f5f0;
    animation: loaderFadeOut 0.55s ease 3.2s forwards;
  }

  .loader-scene {
    position: relative;
    width: 300px; height: 280px;
  }

  /* ───────────── Golden sun circle ───────────── */
  .loader-sun {
    position: absolute;
    top: 6px; left: 50%;
    transform: translateX(-50%) scale(0);
    width: 190px; height: 190px;
    border-radius: 50%;
    overflow: hidden;
    transform-origin: center center;
    animation: sunReveal 0.8s cubic-bezier(0.34, 1.56, 0.64, 1) 0.2s forwards;
  }
  .loader-sun svg { width: 100%; height: 100%; display: block; }
  /* Skyline rises up inside the circle */
  .loader-sun .skyline-group {
    transform: translateY(70px);
    animation: skylineRise 0.6s ease 0.55s forwards;
  }

  /* ───────────── Shadow ───────────── */
  .loader-shadow {
    position: absolute;
    bottom: 60px; left: 50%;
    transform: translateX(-50%) scaleX(0);
    width: 96px; height: 15px;
    background: radial-gradient(ellipse, rgba(0,0,0,0.16) 0%, transparent 70%);
    border-radius: 50%;
    animation: shadowGrow 0.5s ease 0.85s forwards;
  }

  /* ───────────── Walking figure ───────────── */
  .loader-figure {
    position: absolute;
    bottom: 52px; left: 50%;
    width: 110px; height: 190px;
    transform: translateX(-50%);
    opacity: 0;
    animation: figureWalkIn 1.7s cubic-bezier(0.22, 0.61, 0.36, 1) 0.05s forwards;
  }
  .loader-figure svg { width: 100%; height: 100%; overflow: visible; }

  /* Subtle vertical body bob, two steps per gait cycle */
  .figure-body {
    animation: bodyBob 0.34s ease-in-out infinite;
  }

  /* Limb pivots — origins sit exactly on hip / shoulder joints.
     Gait cycle = 0.68s. Arms swing in opposition to legs. */
  .leg-front { transform-origin: 55px 96px; animation: legA 0.68s ease-in-out infinite; }
  .leg-back  { transform-origin: 55px 96px; animation: legB 0.68s ease-in-out infinite; }
  .shin-front { transform-origin: 55px 130px; animation: shinA 0.68s ease-in-out infinite; }
  .shin-back  { transform-origin: 55px 130px; animation: shinB 0.68s ease-in-out infinite; }
  .arm-back  { transform-origin: 55px 60px; animation: armB 0.68s ease-in-out infinite; }
  .arm-front { transform-origin: 55px 60px; animation: armA 0.68s ease-in-out infinite; }
  .bag-group { transform-origin: 55px 60px; animation: armA 0.68s ease-in-out infinite; }

  /* ───────────── Brand text ───────────── */
  .loader-text {
    margin-top: 18px;
    font-size: 30px;
    font-weight: 800;
    letter-spacing: -0.5px;
    white-space: nowrap;
  }
  .loader-text .t-daily { color: #1a1a1a; }
  .loader-text .t-stop  { color: #e8a308; }
  .loader-text .t-toshop{ color: #1a1a1a; }
  .loader-text span span {
    display: inline-block;
    opacity: 0;
    transform: translateY(14px) scale(0.6);
    animation: charBounce 0.42s cubic-bezier(0.34, 1.56, 0.64, 1) forwards;
  }
  .t-daily  span:nth-child(1){animation-delay:1.45s}
  .t-daily  span:nth-child(2){animation-delay:1.50s}
  .t-daily  span:nth-child(3){animation-delay:1.55s}
  .t-daily  span:nth-child(4){animation-delay:1.60s}
  .t-daily  span:nth-child(5){animation-delay:1.65s}
  .t-stop   span:nth-child(1){animation-delay:1.75s}
  .t-stop   span:nth-child(2){animation-delay:1.80s}
  .t-stop   span:nth-child(3){animation-delay:1.85s}
  .t-stop   span:nth-child(4){animation-delay:1.90s}
  .t-toshop span:nth-child(1){animation-delay:2.00s}
  .t-toshop span:nth-child(2){animation-delay:2.05s}
  .t-toshop span:nth-child(3){animation-delay:2.10s}
  .t-toshop span:nth-child(4){animation-delay:2.15s}
  .t-toshop span:nth-child(5){animation-delay:2.20s}
  .t-toshop span:nth-child(6){animation-delay:2.25s}

  /* ───────────── Keyframes ───────────── */
  @keyframes sunReveal {
    0%   { transform: translateX(-50%) scale(0); }
    100% { transform: translateX(-50%) scale(1); }
  }
  @keyframes skylineRise {
    0%   { transform: translateY(70px); }
    100% { transform: translateY(0); }
  }
  @keyframes shadowGrow {
    0%   { transform: translateX(-50%) scaleX(0); opacity: 0; }
    100% { transform: translateX(-50%) scaleX(1); opacity: 1; }
  }
  @keyframes figureWalkIn {
    0%   { opacity: 0; transform: translateX(-260%); }
    25%  { opacity: 1; }
    100% { opacity: 1; transform: translateX(-50%); }
  }
  @keyframes charBounce {
    0%   { opacity: 0; transform: translateY(14px) scale(0.6); }
    100% { opacity: 1; transform: translateY(0) scale(1); }
  }
  @keyframes loaderFadeOut {
    0%   { opacity: 1; }
    100% { opacity: 0; visibility: hidden; pointer-events: none; }
  }

  /* Body bobs up at the passing pose, down at contact — twice per gait cycle */
  @keyframes bodyBob {
    0%   { transform: translateY(0); }
    50%  { transform: translateY(-2.5px); }
    100% { transform: translateY(0); }
  }

  /* Thigh swing (pivot at hip). Front/back are half a cycle apart. */
  @keyframes legA {
    0%   { transform: rotate(28deg); }   /* contact, forward */
    50%  { transform: rotate(-26deg); }  /* extended back */
    100% { transform: rotate(28deg); }
  }
  @keyframes legB {
    0%   { transform: rotate(-26deg); }
    50%  { transform: rotate(28deg); }
    100% { transform: rotate(-26deg); }
  }
  /* Shin bend (pivot at knee). Knee bends most as the leg passes under/behind. */
  @keyframes shinA {
    0%   { transform: rotate(2deg); }
    25%  { transform: rotate(38deg); }   /* knee lifts during swing-through */
    50%  { transform: rotate(10deg); }
    100% { transform: rotate(2deg); }
  }
  @keyframes shinB {
    0%   { transform: rotate(10deg); }
    50%  { transform: rotate(2deg); }
    75%  { transform: rotate(38deg); }
    100% { transform: rotate(10deg); }
  }
  /* Arms swing in opposition to legs (pivot at shoulder). */
  @keyframes armA {
    0%   { transform: rotate(-22deg); }
    50%  { transform: rotate(20deg); }
    100% { transform: rotate(-22deg); }
  }
  @keyframes armB {
    0%   { transform: rotate(20deg); }
    50%  { transform: rotate(-22deg); }
    100% { transform: rotate(20deg); }
  }

  @media (prefers-reduced-motion: reduce) {
    .figure-body, .leg-front, .leg-back, .shin-front, .shin-back,
    .arm-back, .arm-front, .bag-group { animation: none; }
  }
</style>
</head>
<body>

<div class="loader-overlay" id="loader">
  <div class="loader-scene">

    <!-- Golden sun circle with skyline cut out as negative space -->
    <div class="loader-sun">
      <svg viewBox="0 0 190 190" xmlns="http://www.w3.org/2000/svg">
        <defs>
          <mask id="skylineMask">
            <rect x="0" y="0" width="190" height="190" fill="#fff"/>
            <g class="skyline-group" fill="#000">
              <!-- NYC-style skyline cut out of the lower half -->
              <rect x="18" y="120" width="14" height="70"/>
              <rect x="30" y="108" width="10" height="82"/>
              <rect x="42" y="126" width="12" height="64"/>
              <rect x="54" y="112" width="9" height="78"/>
              <rect x="64" y="122" width="12" height="68"/>
              <rect x="78" y="96" width="10" height="94"/>
              <!-- central spire (Empire State) -->
              <rect x="90" y="74" width="12" height="116"/>
              <rect x="94" y="60" width="4" height="22"/>
              <polygon points="93,62 99,62 96,50"/>
              <rect x="104" y="108" width="11" height="82"/>
              <rect x="117" y="120" width="12" height="70"/>
              <rect x="131" y="112" width="9" height="78"/>
              <rect x="142" y="126" width="13" height="64"/>
              <rect x="157" y="118" width="11" height="72"/>
            </g>
          </mask>
        </defs>
        <circle cx="95" cy="95" r="95" fill="#e8a308" mask="url(#skylineMask)"/>
      </svg>
    </div>

    <!-- Ground shadow -->
    <div class="loader-shadow"></div>

    <!-- Walking figure (faces right, walks left -> centre) -->
    <div class="loader-figure">
      <svg viewBox="0 0 110 190" xmlns="http://www.w3.org/2000/svg">
        <g class="figure-body">
          <!-- BACK LEG (drawn first so front leg overlaps) -->
          <g class="leg-back">
            <line x1="55" y1="96" x2="55" y2="132" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
            <g class="shin-back">
              <line x1="55" y1="130" x2="55" y2="168" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
              <line x1="55" y1="168" x2="66" y2="170" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
            </g>
          </g>

          <!-- BACK ARM -->
          <g class="arm-back">
            <line x1="55" y1="60" x2="55" y2="94" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
          </g>

          <!-- HEAD -->
          <circle cx="55" cy="30" r="15" fill="#1a1a1a"/>
          <!-- TORSO -->
          <line x1="55" y1="45" x2="55" y2="98" stroke="#1a1a1a" stroke-width="10" stroke-linecap="round"/>
          <!-- Torso highlight (reflection), slightly left of centre -->
          <path d="M52 50 Q49 72 52 92" fill="none" stroke="#f5f5f0" stroke-width="2.2" stroke-linecap="round"/>

          <!-- FRONT LEG -->
          <g class="leg-front">
            <line x1="55" y1="96" x2="55" y2="132" stroke="#1a1a1a" stroke-width="9" stroke-linecap="round"/>
            <g class="shin-front">
              <line x1="55" y1="130" x2="55" y2="168" stroke="#1a1a1a" stroke-width="8" stroke-linecap="round"/>
              <line x1="55" y1="168" x2="66" y2="170" stroke="#1a1a1a" stroke-width="6" stroke-linecap="round"/>
            </g>
          </g>

          <!-- FRONT ARM (the right hand, holds the bag) -->
          <g class="arm-front">
            <line x1="55" y1="60" x2="55" y2="96" stroke="#1a1a1a" stroke-width="7" stroke-linecap="round"/>
          </g>

          <!-- SHOPPING BAG, swings with the front arm -->
          <g class="bag-group">
            <path d="M50 96 Q50 86 55 86 Q60 86 60 96" fill="none" stroke="#c78b06" stroke-width="2"/>
            <rect x="43" y="96" width="24" height="28" rx="3" fill="#e8a308" stroke="#c78b06" stroke-width="1.5"/>
          </g>
        </g>
      </svg>
    </div>
  </div>

  <!-- Brand text -->
  <div class="loader-text">
    <span class="t-daily"><span>d</span><span>a</span><span>i</span><span>l</span><span>y</span></span><span class="t-stop"><span>s</span><span>t</span><span>o</span><span>p</span></span><span class="t-toshop"><span>t</span><span>o</span><span>s</span><span>h</span><span>o</span><span>p</span></span>
  </div>
</div>

<script>
  // Remove loader once the animation has fully faded out
  window.addEventListener('load', function () {
    setTimeout(function () {
      var loader = document.getElementById('loader');
      if (loader) loader.remove();
    }, 3800);
  });
</script>

</body>
</html>
